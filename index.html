<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Tay Toán Học 11 - HK2</title>
    <link rel="stylesheet" href="style.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            },
            options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        /* CSS ĐÃ SỬA: ÉP CHỮ CHÚ Ý LÊN DÒNG TRÊN */
        .alert-box {
            display: block !important; /* Chuyển từ flex sang block để nội dung xuống hàng */
            border-left: 5px solid #e74c3c !important; 
            background-color: #fdf2f2 !important; 
            padding: 20px !important;
            margin-top: 20px;
            border-radius: 8px;
        }

        /* Tiêu đề "Chú ý" nằm riêng 1 dòng */
        .alert-icon {
            color: #e74c3c;
            font-weight: bold;
            display: block !important; /* Ép xuống dòng */
            margin-bottom: 10px; /* Khoảng cách với nội dung bên dưới */
        }

        /* Nội dung chú ý sát lề trái, không thụt lề */
        .alert-content {
            display: block !important;
            margin-left: 0 !important;
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
